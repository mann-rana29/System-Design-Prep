<svg xmlns="http://www.w3.org/2000/svg" width="960" height="140" viewBox="0 0 960 140" role="img" aria-labelledby="title desc">
  <title id="title">System design approach flow</title>
  <desc id="desc">A five step flow: Gather Requirements, Core Entities, API Design, Data Flow, and High Level Design.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2; }
      .label { fill: #111827; font-family: Arial, Helvetica, sans-serif; font-size: 16px; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #4b5563; stroke-width: 2; marker-end: url(#arrow); }
      @media (prefers-color-scheme: dark) {
        .box { fill: #1f2937; stroke: #e5e7eb; }
        .label { fill: #f9fafb; }
        .arrow { stroke: #d1d5db; }
        #arrow path { fill: #d1d5db; }
      }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="none"/>
  <g transform="translate(10 40)">
    <rect class="box" x="0" y="0" width="120" height="60" rx="8"/>
    <text class="label" x="60" y="22">Gather</text>
    <text class="label" x="60" y="42">Requirements</text>

    <line class="arrow" x1="120" y1="30" x2="195" y2="30"/>

    <rect class="box" x="200" y="0" width="120" height="60" rx="8"/>
    <text class="label" x="260" y="30">Core Entities</text>

    <line class="arrow" x1="320" y1="30" x2="395" y2="30"/>

    <rect class="box" x="400" y="0" width="120" height="60" rx="8"/>
    <text class="label" x="460" y="30">API Design</text>

    <line class="arrow" x1="520" y1="30" x2="595" y2="30"/>

    <rect class="box" x="600" y="0" width="120" height="60" rx="8"/>
    <text class="label" x="660" y="30">Data Flow</text>

    <line class="arrow" x1="720" y1="30" x2="795" y2="30"/>

    <rect class="box" x="800" y="0" width="140" height="60" rx="8"/>
    <text class="label" x="870" y="24">High Level</text>
    <text class="label" x="870" y="44">Design</text>
  </g>
</svg>
